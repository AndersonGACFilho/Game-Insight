spring.application.name=UserService

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://host.docker.internal:27017/userdb

spring.data.mongodb.
spring.data.mongodb.database=userdb
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
jwt.secret=My-secure-secret-key-that-is-at-least-32-characters-long
jwt.expiration=86400
