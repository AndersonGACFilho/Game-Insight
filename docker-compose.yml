services:
  # User Service
  user-service:
    build: ./userservice
    container_name: user-service
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://host.docker.internal:27017/userdb
      - MONGO_DB=userdb
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - mongodb

  mongodb:
    image: mongo:5.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js

  # Game Service
  game-service:
      build: ./gameservice
      container_name: game-service
      ports:
      - "8081:8080"
      environment:
        - POSTGRES_HOST=host.docker.internal
        - POSTGRES_PORT=5440
        - POSTGRES_DB=gamedb
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=postgres
        - SPRING_PROFILES_ACTIVE=prod
      depends_on:
      - postgres

  postgres:
      image: postgres:13
      container_name: postgres
      ports:
          - "5440:5432"
      environment:
          - POSTGRES_USER=postgres
          - POSTGRES_PASSWORD=postgres
          - POSTGRES_DB=gamedb
      volumes:
          - postgres-data:/var/lib/postgresql/data


volumes:
  mongo-data:
  postgres-data:
